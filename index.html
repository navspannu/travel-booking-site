<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Your Rich Life — Book a Consultation with Mikaela Lane</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Noir Rose palette */
      --noir: #0D0D0D;
      --noir-light: #1A1A1A;
      --noir-card: #141414;
      --rose: #C4727F;
      --rose-light: #D4919B;
      --rose-muted: #E8C4CA;
      --rose-pale: #F2DDE0;
      --rose-bg: rgba(196,114,127,0.08);
      --cream: #FAF5F0;
      --white: #FFFFFF;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255,255,255,0.65);
      --text-muted: rgba(255,255,255,0.4);
      --border: rgba(196,114,127,0.25);
      --border-subtle: rgba(255,255,255,0.08);
      --success: #6FCF97;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--noir);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #0D0D0D 0%, #1A0A0E 40%, #0D0D0D 100%);
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,114,127,0.08) 0%, transparent 70%);
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,114,127,0.05) 0%, transparent 70%);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 20px;
    }

    .hero-label {
      display: inline-block;
      padding: 6px 20px;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 32px;
    }

    .hero h1 {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 8px;
      color: var(--white);
    }

    .hero h1 .rose { color: var(--rose); font-style: italic; }

    .hero-sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(16px, 3vw, 22px);
      color: var(--text-secondary);
      margin-bottom: 40px;
      max-width: 500px;
    }

    .hero-author {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 40px;
    }

    .hero-author strong { color: var(--white); font-weight: 600; }

    /* ─── BUTTONS ─── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--rose);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 16px;
      padding: 16px 40px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover { background: #B5636F; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(196,114,127,0.25); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: transparent;
      color: var(--rose-light);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 12px 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover { background: rgba(196,114,127,0.08); border-color: var(--rose); }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border-subtle);
      border-radius: 12px;
      overflow: hidden;
      margin: 48px 0;
      max-width: 640px;
      width: 100%;
    }

    .stat {
      background: var(--noir-light);
      padding: 24px 16px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: var(--rose);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    @media (max-width: 500px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }

    /* ─── FEATURES ─── */
    .features {
      position: relative;
      z-index: 1;
      padding: 0 20px 60px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 720px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      .feature-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .feature-card {
      background: var(--noir-light);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .feature-card:hover { border-color: var(--border); }

    .feature-num {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: var(--rose);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .feature-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--rose-light);
      margin-bottom: 8px;
      font-style: italic;
    }

    .feature-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ─── SOCIAL BAR ─── */
    .social-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid var(--border-subtle);
      border-radius: 50px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .social-link:hover {
      border-color: var(--rose);
      color: var(--rose-light);
      background: rgba(196,114,127,0.06);
    }

    .social-link svg { width: 18px; height: 18px; fill: currentColor; }

    /* ─── CARD / FORM ─── */
    .card {
      background: var(--noir-light);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 40px;
    }

    @media (max-width: 600px) {
      .card { padding: 28px 20px; border-radius: 12px; }
    }

    .progress-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .progress-step {
      flex: 1;
      height: 3px;
      border-radius: 3px;
      background: var(--border-subtle);
      transition: background 0.4s;
    }

    .progress-step.active { background: var(--rose); }
    .progress-step.done { background: var(--rose-muted); }

    .step-label {
      font-size: 12px;
      color: var(--rose);
      font-weight: 600;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .step-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 8px;
    }

    .step-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* ─── FORM INPUTS ─── */
    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--white);
      background: rgba(255,255,255,0.04);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    select { color: var(--text-secondary); }
    select option { background: var(--noir-light); color: var(--white); }

    input:focus, select:focus, textarea:focus {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(196,114,127,0.12);
    }

    textarea { resize: vertical; min-height: 80px; }

    label {
      display: block;
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-secondary);
      letter-spacing: 0.2px;
    }

    .field { margin-bottom: 20px; }

    /* ─── TAG SELECTOR ─── */
    .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag {
      padding: 8px 16px;
      border: 1px solid var(--border-subtle);
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--text-secondary);
      user-select: none;
    }

    .tag:hover { border-color: var(--rose); color: var(--rose-light); }

    .tag.selected {
      background: var(--rose);
      border-color: var(--rose);
      color: var(--white);
    }

    /* ─── SPENDING CATEGORIES ─── */
    .spend-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }

    .spend-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      animation: fadeInUp 0.25s ease-out;
    }

    .spend-row-label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .spend-row-input {
      width: 120px !important;
      text-align: right;
      padding: 10px 12px !important;
      font-size: 14px !important;
      border-radius: 8px !important;
    }

    .spend-row .dollar-sign {
      color: var(--rose);
      font-weight: 600;
      font-size: 14px;
    }

    .spend-row button.remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }

    .spend-row button.remove-btn:hover { color: var(--rose); }

    /* ─── CALENDAR ─── */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 20px;
    }

    .calendar-header {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border-radius: 8px;
      cursor: default;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .calendar-day.available {
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .calendar-day.available:hover { background: rgba(196,114,127,0.12); color: var(--rose-light); }

    .calendar-day.selected {
      background: var(--rose) !important;
      color: var(--white) !important;
      font-weight: 600;
    }

    .calendar-day.empty { visibility: hidden; }

    .time-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media (max-width: 500px) { .time-slots { grid-template-columns: repeat(2, 1fr); } }

    .time-slot {
      padding: 12px;
      text-align: center;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--text-secondary);
    }

    .time-slot:hover { border-color: var(--rose); color: var(--rose-light); }

    .time-slot.selected {
      border-color: var(--rose);
      background: var(--rose);
      color: var(--white);
    }

    /* ─── PAYMENT SUMMARY ─── */
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 15px;
    }

    .summary-row:last-child { border-bottom: none; }
    .summary-row .label { color: var(--text-secondary); }
    .summary-row .value { font-weight: 600; color: var(--white); }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      font-size: 20px;
      font-weight: 700;
      border-top: 1px solid var(--rose);
      margin-top: 4px;
      color: var(--white);
    }

    .summary-total .value { color: var(--rose); }

    /* ─── CONFIRMATION ─── */
    .check-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    /* ─── QR ─── */
    .share-box {
      background: rgba(196,114,127,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
    }

    #qr-code-container { display: flex; justify-content: center; margin: 16px 0; }
    #qr-code-container canvas, #qr-code-container img { border-radius: 8px; }

    /* ─── ANIMATIONS ─── */
    .fade-in { animation: fadeInUp 0.4s ease-out; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── DIVIDER ─── */
    .rose-line {
      width: 60px;
      height: 2px;
      background: var(--rose);
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── CONFIG ─── */
    const CONFIG = {
      consultantName: "Mikaela",
      fullName: "Mikaela Lane, CPA",
      brandName: "Live Your Rich Life",
      tagline: "Maximizing Rewards for Luxury Travel",
      heroLine: "30 minutes that could save you thousands — and upgrade your travel forever",
      sessionPrice: 75,
      sessionLength: "45 min",
      currency: "$",
      availableSlots: ["9:00 AM", "10:00 AM", "11:00 AM", "1:00 PM", "2:00 PM", "3:00 PM", "4:00 PM"],
      availableDays: [1, 2, 3, 4, 5],
      bookingUrl: window.location.href,
      instagram: "https://www.instagram.com/lane.mikaela/",
      tiktok: "https://www.tiktok.com/@travelwithmikaela",
    };

    const CREDIT_CARDS = [
      "Chase Sapphire Preferred", "Chase Sapphire Reserve", "Amex Gold",
      "Amex Platinum", "Capital One Venture X", "Citi Premier",
      "Ink Business Preferred", "Amex Blue Business Plus",
      "Marriott Bonvoy Boundless", "Hilton Honors Aspire",
      "Southwest Rapid Rewards", "United Explorer", "Delta SkyMiles Gold",
      "World of Hyatt", "IHG One Rewards Premier", "TD Aeroplan Visa Infinite",
      "AMEX Cobalt", "Other"
    ];

    const SPENDING_CATEGORIES = [
      "Dining / Restaurants",
      "Groceries",
      "Gas / Fuel",
      "Travel / Flights",
      "Entertainment",
      "Online Shopping",
      "Utilities",
      "Transit / Rideshare",
      "Subscriptions / Streaming",
      "Rent / Mortgage",
      "Insurance",
      "Other",
    ];

    const TRAVEL_GOALS = [
      "Earn more points & miles faster",
      "Book award flights (business / first class)",
      "Book award flights (economy)",
      "Hotel points optimization",
      "Credit card strategy & welcome bonuses",
      "Trip planning with points",
      "Transfer partner strategy (Aeroplan, AMEX MR)",
      "General rewards education",
    ];

    /* ─── ICONS ─── */
    const InstagramIcon = () => (
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
    );

    const TikTokIcon = () => (
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 0010.86 4.48V13a8.28 8.28 0 005.58 2.16v-3.44a4.85 4.85 0 01-2.65-.78V6.69h2.65z"/></svg>
    );

    /* ─── HERO ─── */
    function Hero({ onStart }) {
      const qrGenerated = useRef(false);

      useEffect(() => {
        if (!qrGenerated.current) {
          const timer = setTimeout(() => {
            const container = document.getElementById('qr-code-container');
            if (container && !container.hasChildNodes()) {
              new QRCode(container, {
                text: CONFIG.bookingUrl,
                width: 140,
                height: 140,
                colorDark: "#C4727F",
                colorLight: "#0D0D0D",
                correctLevel: QRCode.CorrectLevel.M,
              });
              qrGenerated.current = true;
            }
          }, 200);
          return () => clearTimeout(timer);
        }
      }, []);

      return (
        <div className="hero">
          <div className="hero-bg" />
          <div className="hero-content">
            <div className="hero-label">Rewards Strategy Consultation</div>

            <h1>
              <span className="rose">Live Your</span><br />
              RICH LIFE<br />
              <span className="rose">For Free</span>
            </h1>

            <div className="rose-line" style={{ margin: '24px auto' }} />

            <p className="hero-sub">{CONFIG.tagline}</p>

            <p className="hero-author">with <strong>{CONFIG.fullName}</strong></p>

            <div className="social-bar" style={{ marginTop: '4px', marginBottom: '32px' }}>
              <a href={CONFIG.instagram} target="_blank" rel="noopener noreferrer" className="social-link">
                <InstagramIcon /> @lane.mikaela
              </a>
              <a href={CONFIG.tiktok} target="_blank" rel="noopener noreferrer" className="social-link">
                <TikTokIcon /> @travelwithmikaela
              </a>
            </div>

            <button className="btn-primary" onClick={onStart}
              style={{ maxWidth: '360px', fontSize: '17px', padding: '18px 48px' }}>
              Book Your Consultation
            </button>
            <p style={{ color: 'var(--text-muted)', fontSize: '13px', marginTop: '14px' }}>
              {CONFIG.sessionLength} &middot; {CONFIG.currency}{CONFIG.sessionPrice}
            </p>

            {/* Stats from the deck */}
            <div className="stats-bar">
              <div className="stat">
                <div className="stat-value">$20K+</div>
                <div className="stat-label">Saved</div>
              </div>
              <div className="stat">
                <div className="stat-value">$172</div>
                <div className="stat-label">Out of Pocket</div>
              </div>
              <div className="stat">
                <div className="stat-value">161K</div>
                <div className="stat-label">Points Used</div>
              </div>
              <div className="stat">
                <div className="stat-value">12¢/pt</div>
                <div className="stat-label">Value</div>
              </div>
            </div>
          </div>

          {/* Framework + Features */}
          <div className="features">
            <p style={{ textAlign: 'center', fontStyle: 'italic', color: 'var(--rose-light)', fontSize: '14px', marginBottom: '24px', fontFamily: "'Playfair Display', serif" }}>
              {CONFIG.heroLine}
            </p>

            <div className="feature-grid">
              {[
                { num: '01', title: 'Dream', desc: 'Define the experience you want' },
                { num: '02', title: 'Design', desc: 'Build your credit card strategy & ecosystem' },
                { num: '03', title: 'Earn', desc: 'Maximize every dollar you spend' },
                { num: '04', title: 'Redeem', desc: 'Book the experience you designed for' },
              ].map((f, i) => (
                <div className="feature-card" key={i}>
                  <div className="feature-num">{f.num}</div>
                  <div className="feature-title">{f.title}</div>
                  <div className="feature-desc">{f.desc}</div>
                </div>
              ))}
            </div>

            {/* QR Share */}
            <div style={{ marginTop: '48px' }}>
              <div style={{ maxWidth: '400px', margin: '0 auto' }}>
                <div className="share-box">
                  <p style={{ fontWeight: 600, fontSize: '14px', color: 'var(--rose-light)', marginBottom: '4px' }}>Share this booking link</p>
                  <p style={{ fontSize: '12px', color: 'var(--text-muted)', marginBottom: '12px' }}>Scan or share the link below</p>
                  <div id="qr-code-container"></div>
                  <p style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '12px', wordBreak: 'break-all' }}>
                    {CONFIG.bookingUrl}
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── STEP 1: INTAKE ─── */
    function IntakeForm({ data, onChange, onNext, onBack }) {
      const [errors, setErrors] = useState({});

      const validate = () => {
        const e = {};
        if (!data.firstName.trim()) e.firstName = true;
        if (!data.email.trim() || !data.email.includes('@')) e.email = true;
        if (data.goals.length === 0) e.goals = true;
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const toggleGoal = (goal) => {
        const next = data.goals.includes(goal) ? data.goals.filter(g => g !== goal) : [...data.goals, goal];
        onChange({ ...data, goals: next });
      };

      const toggleCard = (card) => {
        const next = data.cards.includes(card) ? data.cards.filter(c => c !== card) : [...data.cards, card];
        onChange({ ...data, cards: next });
      };

      return (
        <div className="fade-in">
          <div className="step-label">Step 1 of 3</div>
          <div className="step-title">Tell us about yourself</div>
          <div className="step-subtitle">Help {CONFIG.consultantName} prepare a personalized strategy session for you.</div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
            <div className="field">
              <label>First Name *</label>
              <input value={data.firstName} onChange={e => onChange({...data, firstName: e.target.value})}
                placeholder="Jane" style={errors.firstName ? {borderColor:'var(--rose)'} : {}} />
            </div>
            <div className="field">
              <label>Last Name</label>
              <input value={data.lastName} onChange={e => onChange({...data, lastName: e.target.value})}
                placeholder="Doe" />
            </div>
          </div>

          <div className="field">
            <label>Email *</label>
            <input type="email" value={data.email} onChange={e => onChange({...data, email: e.target.value})}
              placeholder="jane@example.com" style={errors.email ? {borderColor:'var(--rose)'} : {}} />
          </div>

          <div className="field">
            <label>What are your travel goals? * <span style={{fontWeight:400, color:'var(--text-muted)'}}>select all that apply</span></label>
            <div className="tag-grid">
              {TRAVEL_GOALS.map(goal => (
                <div key={goal} className={`tag ${data.goals.includes(goal) ? 'selected' : ''}`}
                  onClick={() => toggleGoal(goal)}>{goal}</div>
              ))}
            </div>
            {errors.goals && <p style={{color:'var(--rose)', fontSize:'13px', marginTop:'6px'}}>Please select at least one goal</p>}
          </div>

          <div className="field">
            <label>Annual travel budget (approx.)</label>
            <select value={data.budget} onChange={e => onChange({...data, budget: e.target.value})}>
              <option value="">Select a range...</option>
              <option value="under-2k">Under $2,000</option>
              <option value="2k-5k">$2,000 – $5,000</option>
              <option value="5k-10k">$5,000 – $10,000</option>
              <option value="10k-20k">$10,000 – $20,000</option>
              <option value="20k-plus">$20,000+</option>
            </select>
          </div>

          <div className="field">
            <label>Credit cards you currently hold <span style={{fontWeight:400, color:'var(--text-muted)'}}>select all that apply</span></label>
            <div className="tag-grid">
              {CREDIT_CARDS.map(card => (
                <div key={card} className={`tag ${data.cards.includes(card) ? 'selected' : ''}`}
                  onClick={() => toggleCard(card)}>{card}</div>
              ))}
            </div>
          </div>

          <div className="field">
            <label>What are your biggest monthly spending categories?</label>
            <p style={{ fontSize: '13px', color: 'var(--text-muted)', marginBottom: '14px', fontStyle: 'italic', lineHeight: '1.6' }}>
              Different cards earn bonus points in different categories. Knowing where your money goes helps {CONFIG.consultantName} recommend the cards that will earn you the most rewards on spending you're already doing.
            </p>
            <div className="tag-grid">
              {SPENDING_CATEGORIES.map(cat => (
                <div key={cat}
                  className={`tag ${data.spending[cat] !== undefined ? 'selected' : ''}`}
                  onClick={() => {
                    const next = { ...data.spending };
                    if (next[cat] !== undefined) { delete next[cat]; }
                    else { next[cat] = ''; }
                    onChange({ ...data, spending: next });
                  }}>
                  {cat}
                </div>
              ))}
            </div>

            {Object.keys(data.spending).length > 0 && (
              <div className="spend-list">
                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '0 16px', marginBottom: '2px' }}>
                  <span style={{ flex: 1, fontSize: '11px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--rose)' }}>Category</span>
                  <span style={{ width: '140px', fontSize: '11px', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '1px', color: 'var(--rose)', textAlign: 'right', paddingRight: '28px' }}>Monthly Spend</span>
                </div>
                {Object.keys(data.spending).map(cat => (
                  <div className="spend-row" key={cat}>
                    <span className="spend-row-label">{cat}</span>
                    <span className="dollar-sign">$</span>
                    <input
                      className="spend-row-input"
                      type="text"
                      inputMode="numeric"
                      placeholder="e.g. 500"
                      value={data.spending[cat]}
                      onChange={e => {
                        const val = e.target.value.replace(/[^\d]/g, '');
                        const next = { ...data.spending, [cat]: val };
                        onChange({ ...data, spending: next });
                      }}
                    />
                    <button className="remove-btn" onClick={() => {
                      const next = { ...data.spending };
                      delete next[cat];
                      onChange({ ...data, spending: next });
                    }}>&times;</button>
                  </div>
                ))}
                <p style={{ fontSize: '12px', color: 'var(--text-muted)', marginTop: '8px', paddingLeft: '4px' }}>
                  Estimates are fine — no need to be exact!
                </p>
              </div>
            )}
          </div>

          <div className="field">
            <label>Anything else {CONFIG.consultantName} should know?</label>
            <textarea value={data.notes} onChange={e => onChange({...data, notes: e.target.value})}
              placeholder="Dream destinations, upcoming trips, specific questions..." />
          </div>

          <div style={{ display: 'flex', gap: '12px', marginTop: '8px' }}>
            <button className="btn-secondary" onClick={onBack}>Back</button>
            <button className="btn-primary" onClick={() => validate() && onNext()}>Continue to Scheduling</button>
          </div>
        </div>
      );
    }

    /* ─── STEP 2: CALENDAR ─── */
    function CalendarStep({ selectedDate, selectedTime, onSelectDate, onSelectTime, onNext, onBack }) {
      const [viewMonth, setViewMonth] = useState(() => {
        const now = new Date(); return { year: now.getFullYear(), month: now.getMonth() };
      });

      const daysInMonth = new Date(viewMonth.year, viewMonth.month + 1, 0).getDate();
      const firstDay = new Date(viewMonth.year, viewMonth.month, 1).getDay();
      const today = new Date(); today.setHours(0,0,0,0);

      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

      const isAvailable = (day) => {
        const date = new Date(viewMonth.year, viewMonth.month, day);
        if (date < today) return false;
        return CONFIG.availableDays.includes(date.getDay());
      };

      const dateKey = (day) => `${viewMonth.year}-${String(viewMonth.month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

      const prevMonth = () => setViewMonth(v => v.month === 0 ? { year: v.year - 1, month: 11 } : { ...v, month: v.month - 1 });
      const nextMonth = () => setViewMonth(v => v.month === 11 ? { year: v.year + 1, month: 0 } : { ...v, month: v.month + 1 });

      const formatSelectedDate = () => {
        if (!selectedDate) return '';
        const [y, m, d] = selectedDate.split('-');
        return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      };

      return (
        <div className="fade-in">
          <div className="step-label">Step 2 of 3</div>
          <div className="step-title">Pick a time</div>
          <div className="step-subtitle">Choose a date and time for your {CONFIG.sessionLength} consultation.</div>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
            <button className="btn-secondary" onClick={prevMonth} style={{padding:'8px 16px'}}>&#8249;</button>
            <span style={{ fontWeight: 600, fontSize: '16px' }}>{monthNames[viewMonth.month]} {viewMonth.year}</span>
            <button className="btn-secondary" onClick={nextMonth} style={{padding:'8px 16px'}}>&#8250;</button>
          </div>

          <div className="calendar-grid">
            {dayNames.map(d => <div key={d} className="calendar-header">{d}</div>)}
            {Array.from({ length: firstDay }, (_, i) => <div key={`e${i}`} className="calendar-day empty" />)}
            {Array.from({ length: daysInMonth }, (_, i) => {
              const day = i + 1;
              const avail = isAvailable(day);
              const key = dateKey(day);
              return (
                <div key={day}
                  className={`calendar-day ${avail ? 'available' : ''} ${selectedDate === key ? 'selected' : ''}`}
                  onClick={() => avail && onSelectDate(key)}>{day}</div>
              );
            })}
          </div>

          {selectedDate && (
            <div className="fade-in">
              <p style={{ fontWeight: 600, fontSize: '15px', marginBottom: '12px', color: 'var(--rose-light)' }}>
                Available times — {formatSelectedDate()}
              </p>
              <div className="time-slots">
                {CONFIG.availableSlots.map(slot => (
                  <div key={slot} className={`time-slot ${selectedTime === slot ? 'selected' : ''}`}
                    onClick={() => onSelectTime(slot)}>{slot}</div>
                ))}
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: '12px', marginTop: '28px' }}>
            <button className="btn-secondary" onClick={onBack}>Back</button>
            <button className="btn-primary" disabled={!selectedDate || !selectedTime} onClick={onNext}>Continue to Payment</button>
          </div>
        </div>
      );
    }

    /* ─── STEP 3: PAYMENT ─── */
    function PaymentStep({ intake, selectedDate, selectedTime, onBack, onConfirm }) {
      const [cardNum, setCardNum] = useState('');
      const [expiry, setExpiry] = useState('');
      const [cvc, setCvc] = useState('');
      const [nameOnCard, setNameOnCard] = useState('');
      const [processing, setProcessing] = useState(false);

      const formatDate = () => {
        if (!selectedDate) return '';
        const [y, m, d] = selectedDate.split('-');
        return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
      };

      const handlePay = () => {
        setProcessing(true);
        setTimeout(() => { setProcessing(false); onConfirm(); }, 2000);
      };

      const formatCardNum = (val) => {
        const digits = val.replace(/\D/g, '').slice(0, 16);
        return digits.replace(/(.{4})/g, '$1 ').trim();
      };

      const formatExpiry = (val) => {
        const digits = val.replace(/\D/g, '').slice(0, 4);
        if (digits.length > 2) return digits.slice(0, 2) + '/' + digits.slice(2);
        return digits;
      };

      return (
        <div className="fade-in">
          <div className="step-label">Step 3 of 3</div>
          <div className="step-title">Confirm & Pay</div>
          <div className="step-subtitle">Review your booking and complete payment.</div>

          <div style={{ background: 'rgba(196,114,127,0.06)', borderRadius: '12px', padding: '20px', marginBottom: '24px', border: '1px solid var(--border)' }}>
            <div className="summary-row">
              <span className="label">Consultation with</span>
              <span className="value">{CONFIG.consultantName}</span>
            </div>
            <div className="summary-row">
              <span className="label">Date</span>
              <span className="value">{formatDate()}</span>
            </div>
            <div className="summary-row">
              <span className="label">Time</span>
              <span className="value">{selectedTime}</span>
            </div>
            <div className="summary-row">
              <span className="label">Duration</span>
              <span className="value">{CONFIG.sessionLength}</span>
            </div>
            <div className="summary-total">
              <span>Total</span>
              <span className="value">{CONFIG.currency}{CONFIG.sessionPrice}.00</span>
            </div>
          </div>

          <div style={{ border: '1px solid var(--border-subtle)', borderRadius: '12px', padding: '24px', marginBottom: '20px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '20px' }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--rose)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
              </svg>
              <span style={{ fontWeight: 600, fontSize: '15px' }}>Payment Details</span>
              <span style={{ marginLeft: 'auto', fontSize: '11px', padding: '3px 10px', borderRadius: '50px', background: 'rgba(111,207,151,0.1)', color: 'var(--success)' }}>
                Secure
              </span>
            </div>

            <div className="field">
              <label>Name on card</label>
              <input value={nameOnCard} onChange={e => setNameOnCard(e.target.value)} placeholder="Jane Doe" />
            </div>
            <div className="field">
              <label>Card number</label>
              <input value={cardNum} onChange={e => setCardNum(formatCardNum(e.target.value))} placeholder="4242 4242 4242 4242" maxLength="19" />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
              <div className="field">
                <label>Expiry</label>
                <input value={expiry} onChange={e => setExpiry(formatExpiry(e.target.value))} placeholder="MM/YY" maxLength="5" />
              </div>
              <div className="field">
                <label>CVC</label>
                <input value={cvc} onChange={e => setCvc(e.target.value.replace(/\D/g,'').slice(0,4))} placeholder="123" maxLength="4" />
              </div>
            </div>
            <p style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>
              In production, this will be a Stripe checkout — no card data touches your server.
            </p>
          </div>

          <div style={{ display: 'flex', gap: '12px' }}>
            <button className="btn-secondary" onClick={onBack}>Back</button>
            <button className="btn-primary" onClick={handlePay} disabled={processing}>
              {processing ? 'Processing...' : `Pay ${CONFIG.currency}${CONFIG.sessionPrice}.00 & Book`}
            </button>
          </div>
        </div>
      );
    }

    /* ─── CONFIRMATION ─── */
    function Confirmation({ intake, selectedDate, selectedTime }) {
      const formatDate = () => {
        if (!selectedDate) return '';
        const [y, m, d] = selectedDate.split('-');
        return new Date(y, m - 1, d).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      };

      return (
        <div className="fade-in" style={{ textAlign: 'center' }}>
          <div className="check-circle">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: '28px', marginBottom: '8px' }}>You're booked!</h2>
          <p style={{ color: 'var(--text-secondary)', fontSize: '15px', marginBottom: '28px' }}>
            A confirmation email is on its way to <strong style={{color:'var(--white)'}}>{intake.email}</strong>
          </p>

          <div style={{ background: 'rgba(196,114,127,0.06)', borderRadius: '12px', padding: '24px', textAlign: 'left', marginBottom: '24px', border: '1px solid var(--border)' }}>
            <div className="summary-row">
              <span className="label">Consultation with</span>
              <span className="value">{CONFIG.consultantName}</span>
            </div>
            <div className="summary-row">
              <span className="label">Date</span>
              <span className="value">{formatDate()}</span>
            </div>
            <div className="summary-row">
              <span className="label">Time</span>
              <span className="value">{selectedTime} ({CONFIG.sessionLength})</span>
            </div>
            <div className="summary-row">
              <span className="label">Client</span>
              <span className="value">{intake.firstName} {intake.lastName}</span>
            </div>
          </div>

          <div style={{ background: 'var(--noir-card)', borderRadius: '12px', padding: '24px', textAlign: 'left', fontSize: '14px', lineHeight: '1.8', border: '1px solid var(--border-subtle)' }}>
            <strong style={{ color: 'var(--rose-light)', fontFamily: "'Playfair Display', serif", fontSize: '16px' }}>Before your session:</strong>
            <ul style={{ paddingLeft: '20px', marginTop: '12px', color: 'var(--text-secondary)' }}>
              <li>Have your current credit card statements handy</li>
              <li>Think about your top 2-3 dream destinations</li>
              <li>Write down any specific questions you'd like answered</li>
            </ul>
          </div>

          <div className="social-bar" style={{ marginTop: '28px' }}>
            <a href={CONFIG.instagram} target="_blank" rel="noopener noreferrer" className="social-link">
              <InstagramIcon /> Follow on Instagram
            </a>
            <a href={CONFIG.tiktok} target="_blank" rel="noopener noreferrer" className="social-link">
              <TikTokIcon /> Follow on TikTok
            </a>
          </div>
        </div>
      );
    }

    /* ─── NAV BAR (for form steps) ─── */
    function NavBar({ onClick }) {
      return (
        <div style={{ textAlign: 'center', marginBottom: '24px', cursor: 'pointer' }} onClick={onClick}>
          <span style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: '18px', color: 'var(--rose-light)' }}>
            {CONFIG.brandName}
          </span>
          <span style={{ color: 'var(--text-muted)', fontSize: '14px', marginLeft: '8px' }}>| {CONFIG.fullName}</span>
        </div>
      );
    }

    /* ─── APP ─── */
    function App() {
      const [step, setStep] = useState(0);
      const [intake, setIntake] = useState({ firstName: '', lastName: '', email: '', goals: [], budget: '', cards: [], spending: {}, notes: '' });
      const [selectedDate, setSelectedDate] = useState(null);
      const [selectedTime, setSelectedTime] = useState(null);

      useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [step]);

      const progressSteps = 3;
      const currentProgress = step >= 1 ? step : 0;

      return (
        <div>
          {step === 0 && <Hero onStart={() => setStep(1)} />}

          {step >= 1 && step <= 3 && (
            <div style={{ minHeight: '100vh', paddingTop: '40px', paddingBottom: '60px' }}>
              <div className="container">
                <NavBar onClick={() => setStep(0)} />

                <div className="progress-bar">
                  {Array.from({ length: progressSteps }, (_, i) => (
                    <div key={i} className={`progress-step ${i + 1 < currentProgress ? 'done' : ''} ${i + 1 === currentProgress ? 'active' : ''}`} />
                  ))}
                </div>

                <div className="card">
                  {step === 1 && <IntakeForm data={intake} onChange={setIntake} onNext={() => setStep(2)} onBack={() => setStep(0)} />}
                  {step === 2 && <CalendarStep selectedDate={selectedDate} selectedTime={selectedTime} onSelectDate={setSelectedDate} onSelectTime={setSelectedTime} onNext={() => setStep(3)} onBack={() => setStep(1)} />}
                  {step === 3 && <PaymentStep intake={intake} selectedDate={selectedDate} selectedTime={selectedTime} onBack={() => setStep(2)} onConfirm={() => setStep(4)} />}
                </div>
              </div>
            </div>
          )}

          {step === 4 && (
            <div style={{ minHeight: '100vh', paddingTop: '60px', paddingBottom: '60px' }}>
              <div className="container">
                <div className="card"><Confirmation intake={intake} selectedDate={selectedDate} selectedTime={selectedTime} /></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
